<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rota Expedição Amazônia 2027</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root { --teal: #09282B; --lime: #D7F264; --lime-dark: #BFD850; --off-white: #F8F6F7; --ocean: #b8deef; --ui-border: #d7e2ea; --ui-shadow: rgba(15,23,42,0.12); --label: #0f172a; }
  html, body, #map { margin: 0; padding: 0; height: 100%; font-family: 'Manrope', -apple-system, sans-serif; }
  body { background: var(--off-white); }
  #map { border-radius: 24px; }
  .leaflet-container { background: var(--ocean); }
  .info-badge { position: absolute; top: 14px; left: 14px; background: rgba(255,255,255,0.93); backdrop-filter: blur(6px); padding: 9px 14px; border-radius: 16px; font-size: 13px; color: #334155; font-weight: 500; box-shadow: 0 12px 28px var(--ui-shadow); z-index: 1000; display: flex; align-items: center; gap: 10px; border: 1px solid var(--ui-border); min-width: 220px; max-width: calc(100% - 24px); }
  .day-badge { background: var(--teal); color: var(--lime); font-size: 10px; font-weight: 800; padding: 4px 9px; border-radius: 999px; letter-spacing: 0.12em; text-transform: uppercase; flex-shrink: 0; }
  #legDesc { font-weight: 700; color: var(--label); line-height: 1.25; }
  #legDate { display: block; font-size: 10.5px; font-weight: 600; color: #475569; opacity: 0.8; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px; }
  .transport-indicator { position: absolute; top: 14px; right: 14px; background: rgba(255,255,255,0.93); backdrop-filter: blur(6px); padding: 8px 14px; border-radius: 999px; font-size: 12px; color: #334155; font-weight: 600; box-shadow: 0 12px 28px var(--ui-shadow); z-index: 1000; display: flex; align-items: center; gap: 9px; border: 1px solid var(--ui-border); }
  .transport-indicator .emoji { width: 26px; height: 18px; display: flex; align-items: center; justify-content: center; }
  .transport-indicator .emoji svg { width: 100%; height: 100%; }
  .transport-indicator .emoji .body { fill: var(--teal); }
  .transport-indicator .emoji .accent { fill: var(--lime); }
  .transport-indicator .emoji .window { fill: #B8DCE8; }
  .transport-indicator .emoji .detail { fill: rgba(255,255,255,0.85); }
  .transport-indicator .emoji .dark { fill: #051518; }
  .progress-bar { position: absolute; bottom: 14px; left: 14px; right: 14px; height: 4px; background: rgba(9,40,43,0.12); border-radius: 999px; z-index: 1000; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--lime), var(--lime-dark)); width: 0%; transition: width 0.4s linear; border-radius: 999px; }
  .restart-btn { position: absolute; bottom: 28px; right: 14px; z-index: 1000; background: var(--off-white); color: var(--teal); border: 1px solid rgba(9,40,43,0.15); border-radius: 999px; padding: 7px 13px; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 14px rgba(9,40,43,0.15); display: flex; align-items: center; gap: 5px; }
  .restart-btn:hover { background: var(--lime); }
  .vehicle-marker { filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4)); transition: transform 0.6s; }
  .vehicle-marker svg { display: block; width: 100%; height: 100%; }
  .vehicle-marker .accent { fill: var(--lime); }
  .vehicle-marker .body { fill: var(--teal); }
  .vehicle-marker .window { fill: #B8DCE8; }
  .vehicle-marker .detail { fill: rgba(255,255,255,0.85); }
  .vehicle-marker .dark { fill: #051518; }
  .point-label { background: rgba(255,255,255,0.95); color: var(--teal); padding: 2px 7px; border-radius: 999px; font-size: 9.5px; font-weight: 700; box-shadow: 0 2px 6px rgba(9,40,43,0.18); white-space: nowrap; border: 1px solid rgba(9,40,43,0.1); }
  .point-label::before { display: none !important; }
  .leaflet-control-zoom a { background-color: var(--off-white) !important; color: var(--teal) !important; }
  .leaflet-control-attribution { font-size: 9px !important; opacity: 0.5; }
  @media (max-width: 480px) {
    .info-badge { font-size: 11.5px; padding: 8px 11px; min-width: auto; max-width: calc(100% - 20px); }
    #legDesc { font-size: 12px; }
    .transport-indicator { font-size: 11px; padding: 7px 11px; }
    .restart-btn { font-size: 10px; padding: 6px 11px; }
  }
</style>
</head>
<body>
<div class="info-badge"><span class="day-badge" id="dayBadge">Dia 1</span><div><span id="legDesc">Chegada a Manaus</span><span id="legDate">07/07/2027</span></div></div>
<div class="transport-indicator"><span class="emoji" id="transportEmoji" style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px"></span><span id="transportLabel">Transfer privativo</span></div>
<button class="restart-btn" id="restartBtn">↻ Reiniciar</button>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // Fallback: se jsDelivr falhar, tenta unpkg
  if (typeof L === 'undefined') {
    document.write('<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>');
  }
</script>
<script>
  if (typeof L === 'undefined') {
    document.body.innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#09282B;text-align:center"><h2>⚠️ Leaflet não carregou</h2><p>Verifique sua conexão ou se há bloqueio para os CDNs <code>cdn.jsdelivr.net</code> e <code>unpkg.com</code>.</p></div>';
    throw new Error('Leaflet (L) não está disponível.');
  }

  const map = L.map('map', { zoomControl: true, scrollWheelZoom: false }).setView([-2.7, -60.1], 8);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  // Pontos da Expedição Amazônia (coordenadas WGS84)
  const points = {
    manaus:    { coords: [-3.1190, -60.0217],  name: 'Manaus' },              // Teatro Amazonas / centro histórico
    rioNegro:  { coords: [-3.0500, -60.4500],  name: 'Rio Negro' },           // Região de Anavilhanas (passeio fluvial)
    encontro:  { coords: [-3.1356, -59.9028],  name: 'Encontro das Águas' },  // Confluência Rio Negro + Solimões
    presFig:   { coords: [-2.0353, -60.0258],  name: 'Pres. Figueiredo' },    // ~107km ao norte de Manaus
  };

  // Configuração visual (cor + direção do label)
  const pointConfig = {
    manaus:   { color: '#09282B', dir: 'right',  offset: [8, 0]  },
    rioNegro: { color: '#3498DB', dir: 'left',   offset: [-8, 0] },
    encontro: { color: '#F39C12', dir: 'right',  offset: [8, 0]  },
    presFig:  { color: '#27AE60', dir: 'top',    offset: [0, -8] },
  };

  Object.entries(points).forEach(([k, p]) => {
    const c = pointConfig[k];
    L.marker(p.coords, {
      icon: L.divIcon({
        html: `<svg width="16" height="16" viewBox="0 0 16 16" style="filter:drop-shadow(0 2px 4px rgba(9,40,43,0.3))"><circle cx="8" cy="8" r="6" fill="white" stroke="${c.color}" stroke-width="2.5"/><circle cx="8" cy="8" r="2.2" fill="${c.color}"/></svg>`,
        className: '',
        iconSize: [16, 16],
        iconAnchor: [8, 8]
      })
    }).addTo(map).bindTooltip(p.name, {
      permanent: true,
      direction: c.dir,
      offset: c.offset,
      className: 'point-label'
    });
  });

  // Trajetos da expedição (apenas terrestre/fluvial, sem voos)
  const legs = [
    {
      day: 1, date: '07/07/2027',
      from: points.manaus.coords, to: points.manaus.coords,
      vehicle: 'van', label: 'City tour',
      desc: 'Chegada · Teatro Amazonas + Mercado Municipal',
      duration: 2500, color: '#09282B',
      stationary: true  // dia em Manaus, sem deslocamento entre cidades
    },
    {
      day: 2, date: '08/07/2027',
      from: points.manaus.coords, to: points.rioNegro.coords,
      vehicle: 'boat', label: 'Barco privativo',
      desc: 'Rio Negro · churrasco a bordo + botos cor-de-rosa',
      duration: 5000, color: '#3498DB'
    },
    {
      day: 3, date: '09/07/2027',
      from: points.rioNegro.coords, to: points.encontro.coords,
      vehicle: 'boat', label: 'Barco privativo',
      desc: 'Encontro das Águas + comunidade ribeirinha',
      duration: 5000, color: '#F39C12'
    },
    {
      day: 4, date: '10/07/2027',
      from: points.encontro.coords, to: points.presFig.coords,
      vehicle: 'jeep', label: 'Van privativa 4x4',
      desc: 'Pres. Figueiredo · trilha + cachoeiras',
      duration: 5500, color: '#27AE60'
    },
    {
      day: 5, date: '11/07/2027',
      from: points.presFig.coords, to: points.manaus.coords,
      vehicle: 'van', label: 'Retorno a Manaus',
      desc: 'Café de despedida + tempo livre',
      duration: 4500, color: '#09282B'
    },
  ];

  // Desenha todas as linhas de fundo (esmaecidas) — exceto trechos estacionários
  legs.forEach(leg => {
    if (leg.stationary) return;
    L.polyline([leg.from, leg.to], {
      color: leg.color,
      weight: 2.5,
      opacity: 0.32,
      dashArray: leg.dash || null
    }).addTo(map);
  });

  // Referências DOM
  const dayBadge = document.getElementById('dayBadge'),
        legDesc = document.getElementById('legDesc'),
        legDate = document.getElementById('legDate'),
        emojiEl = document.getElementById('transportEmoji'),
        labelEl = document.getElementById('transportLabel'),
        progressFill = document.getElementById('progressFill'),
        restartBtn = document.getElementById('restartBtn');

  // Biblioteca de veículos em SVG inline (paleta da agência: teal + lime)
  const vehicleSVGs = {
    // Van/Transfer - vista lateral, estilo van turística
    van: `
      <svg viewBox="0 0 64 40" xmlns="http://www.w3.org/2000/svg">
        <!-- Sombra base -->
        <ellipse cx="32" cy="36" rx="22" ry="2" fill="rgba(0,0,0,0.2)"/>
        <!-- Corpo principal -->
        <path class="body" d="M 6 28 L 6 14 Q 6 10 10 10 L 44 10 L 52 18 L 56 18 Q 58 18 58 20 L 58 28 Z"/>
        <!-- Para-brisa -->
        <path class="window" d="M 44 11 L 51 18 L 38 18 L 38 11 Z"/>
        <!-- Janelas laterais -->
        <rect class="window" x="11" y="13" width="9" height="6" rx="1"/>
        <rect class="window" x="22" y="13" width="9" height="6" rx="1"/>
        <rect class="window" x="33" y="13" width="3" height="6" rx="0.5"/>
        <!-- Faixa lime (identidade) -->
        <rect class="accent" x="6" y="24" width="52" height="2"/>
        <!-- Rodas -->
        <circle class="dark" cx="16" cy="30" r="5"/>
        <circle class="detail" cx="16" cy="30" r="2"/>
        <circle class="dark" cx="48" cy="30" r="5"/>
        <circle class="detail" cx="48" cy="30" r="2"/>
        <!-- Farol -->
        <circle class="accent" cx="56" cy="22" r="1.5"/>
      </svg>
    `,

    // Barco privativo - lancha de turismo com cabine
    boat: `
      <svg viewBox="0 0 64 40" xmlns="http://www.w3.org/2000/svg">
        <!-- Reflexo na água -->
        <ellipse cx="32" cy="36" rx="24" ry="1.5" fill="rgba(52,152,219,0.4)"/>
        <!-- Casco principal -->
        <path class="body" d="M 4 22 L 58 22 Q 56 32 48 32 L 14 32 Q 6 32 4 22 Z"/>
        <!-- Faixa lime no casco -->
        <path class="accent" d="M 6 24 L 56 24 L 55 27 L 7 27 Z"/>
        <!-- Cabine -->
        <path class="body" d="M 16 22 L 16 12 Q 16 10 18 10 L 40 10 Q 42 10 42 12 L 42 22 Z"/>
        <!-- Janelas da cabine -->
        <rect class="window" x="19" y="13" width="6" height="5" rx="0.5"/>
        <rect class="window" x="27" y="13" width="6" height="5" rx="0.5"/>
        <rect class="window" x="35" y="13" width="5" height="5" rx="0.5"/>
        <!-- Mastro com bandeira -->
        <rect class="dark" x="29" y="2" width="1.5" height="9"/>
        <path class="accent" d="M 30.5 3 L 36 5 L 30.5 7 Z"/>
        <!-- Antena -->
        <circle class="accent" cx="30" cy="2" r="1"/>
      </svg>
    `,

    // Canoa ribeirinha - removida (Rio Negro e Encontro das Águas usam barco)

    // Jeep 4x4 - para trilhas em Pres. Figueiredo
    jeep: `
      <svg viewBox="0 0 64 40" xmlns="http://www.w3.org/2000/svg">
        <!-- Sombra base -->
        <ellipse cx="32" cy="36" rx="24" ry="2" fill="rgba(0,0,0,0.2)"/>
        <!-- Chassi/corpo principal (forma robusta de jeep) -->
        <path class="body" d="M 4 28 L 4 18 Q 4 16 6 16 L 14 16 L 16 10 Q 17 8 20 8 L 44 8 Q 47 8 48 10 L 50 16 L 58 16 Q 60 16 60 18 L 60 28 Z"/>
        <!-- Para-brisa -->
        <path class="window" d="M 18 10 L 46 10 L 48 16 L 16 16 Z"/>
        <!-- Divisória do para-brisa -->
        <rect class="dark" x="31.5" y="10" width="1" height="6"/>
        <!-- Capô -->
        <rect class="dark" x="4" y="17" width="10" height="1"/>
        <!-- Grade frontal -->
        <rect class="accent" x="5" y="19" width="2" height="6" rx="0.5"/>
        <!-- Faixa lateral lime -->
        <rect class="accent" x="4" y="24" width="56" height="2"/>
        <!-- Pneus grandes (off-road) -->
        <circle class="dark" cx="16" cy="30" r="6"/>
        <circle class="body" cx="16" cy="30" r="3.5"/>
        <circle class="detail" cx="16" cy="30" r="1.5"/>
        <circle class="dark" cx="48" cy="30" r="6"/>
        <circle class="body" cx="48" cy="30" r="3.5"/>
        <circle class="detail" cx="48" cy="30" r="1.5"/>
        <!-- Snorkel (entrada de ar elevada, típica de 4x4) -->
        <rect class="dark" x="14" y="4" width="2" height="14"/>
        <!-- Faróis auxiliares no teto -->
        <rect class="accent" x="24" y="6" width="4" height="2" rx="1"/>
        <rect class="accent" x="36" y="6" width="4" height="2" rx="1"/>
        <rect class="dark" x="22" y="5" width="20" height="2" rx="0.5"/>
      </svg>
    `,
  };

  function vehicleIcon(type) {
    return L.divIcon({
      html: `<div class="vehicle-marker" style="width:54px;height:34px">${vehicleSVGs[type] || vehicleSVGs.van}</div>`,
      className: '',
      iconSize: [54, 34],
      iconAnchor: [27, 17]
    });
  }

  let vehicle = L.marker(legs[0].from, {
    icon: vehicleIcon(legs[0].vehicle),
    zIndexOffset: 1000
  }).addTo(map);

  let activeAnimation = null, currentTraveled = [];

  // Inicializa o indicador de transporte com o SVG do primeiro leg
  emojiEl.innerHTML = vehicleSVGs[legs[0].vehicle] || '';

  function interpolate(a, b, t) {
    return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t];
  }

  function clearTraveled() {
    currentTraveled.forEach(p => map.removeLayer(p));
    currentTraveled = [];
  }

  function animateLeg(i) {
    if (i >= legs.length) {
      setTimeout(() => {
        clearTraveled();
        vehicle.setLatLng(legs[0].from);
        animateLeg(0);
      }, 2500);
      return;
    }

    const leg = legs[i];
    dayBadge.textContent = 'Dia ' + leg.day;
    legDesc.textContent = leg.desc;
    legDate.textContent = leg.date;
    emojiEl.innerHTML = vehicleSVGs[leg.vehicle] || '';
    labelEl.textContent = leg.label;
    vehicle.setIcon(vehicleIcon(leg.vehicle));

    // Caso estacionário (Dia 1 em Manaus): só espera, sem desenhar rota
    if (leg.stationary) {
      vehicle.setLatLng(leg.from);
      const start = performance.now(), dur = leg.duration;
      function waitStep(now) {
        const t = Math.min(1, (now - start) / dur);
        progressFill.style.width = ((i + t) / legs.length * 100) + '%';
        if (t < 1) {
          activeAnimation = requestAnimationFrame(waitStep);
        } else {
          setTimeout(() => animateLeg(i + 1), 700);
        }
      }
      activeAnimation = requestAnimationFrame(waitStep);
      return;
    }

    // Linha "viajada" (cor sólida) sobreposta na linha de fundo
    const traveled = L.polyline([leg.from], {
      color: leg.color,
      weight: 4.5,
      opacity: 0.92,
      dashArray: leg.dash || null,
      lineCap: 'round'
    }).addTo(map);
    currentTraveled.push(traveled);

    const start = performance.now(), dur = leg.duration;

    function step(now) {
      const t = Math.min(1, (now - start) / dur);
      const pos = interpolate(leg.from, leg.to, t);
      vehicle.setLatLng(pos);
      traveled.setLatLngs([leg.from, pos]);
      progressFill.style.width = ((i + t) / legs.length * 100) + '%';
      if (t < 1) {
        activeAnimation = requestAnimationFrame(step);
      } else {
        setTimeout(() => animateLeg(i + 1), 700);
      }
    }
    activeAnimation = requestAnimationFrame(step);
  }

  // Ajusta zoom inicial pra enquadrar TODOS os pontos da expedição (zoom mais fechado)
  const allCoords = Object.values(points).map(p => p.coords);
  map.fitBounds(L.latLngBounds(allCoords), {
    padding: [40, 40],
    maxZoom: 9
  });

  restartBtn.addEventListener('click', () => {
    if (activeAnimation) cancelAnimationFrame(activeAnimation);
    clearTraveled();
    progressFill.style.width = '0%';
    vehicle.setLatLng(legs[0].from);
    animateLeg(0);
  });

  animateLeg(0);
</script>
</body>
</html>
